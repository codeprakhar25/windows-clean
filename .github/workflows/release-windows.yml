name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate, for example v0.1.0. Publishing still requires pushing the tag."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build native Windows installers
        run: npm run native:build

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $config = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = [string]$config.version
          $tag = "${{ github.ref_name }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must look like v0.1.0. Got '$tag'."
          }

          if ($tag -ne "v$version") {
            throw "Release tag '$tag' must match src-tauri/tauri.conf.json version '$version'."
          }

          $assetDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $nsis = "src-tauri/target/release/bundle/nsis/SpaceGuard_${version}_x64-setup.exe"
          $msi = "src-tauri/target/release/bundle/msi/SpaceGuard_${version}_x64_en-US.msi"

          if (!(Test-Path $nsis)) {
            throw "Missing NSIS installer: $nsis"
          }
          if (!(Test-Path $msi)) {
            throw "Missing MSI installer: $msi"
          }

          Copy-Item $nsis "$assetDir/SpaceGuardSetup.exe"
          Copy-Item $msi "$assetDir/SpaceGuard_x64.msi"

          Get-ChildItem $assetDir -File | Sort-Object Name | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          } | Set-Content "$assetDir/SHA256SUMS.txt"

          @"
          SpaceGuard $tag

          Windows x64 desktop release.

          Downloads:
          - SpaceGuardSetup.exe: normal Windows installer.
          - SpaceGuard_x64.msi: MSI installer for managed installs.
          - SHA256SUMS.txt: checksums for release files.

          Note: if this release is unsigned, Windows SmartScreen may show an unknown publisher warning.
          "@ | Set-Content "$assetDir/RELEASE_NOTES.md"

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: spaceguard-windows-${{ steps.assets.outputs.tag }}
          path: |
            release-assets/SpaceGuardSetup.exe
            release-assets/SpaceGuard_x64.msi
            release-assets/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.assets.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $title = "SpaceGuard $tag"

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag `
              "release-assets/SpaceGuardSetup.exe" `
              "release-assets/SpaceGuard_x64.msi" `
              "release-assets/SHA256SUMS.txt" `
              --repo $repo `
              --clobber
          } else {
            gh release create $tag `
              "release-assets/SpaceGuardSetup.exe" `
              "release-assets/SpaceGuard_x64.msi" `
              "release-assets/SHA256SUMS.txt" `
              --repo $repo `
              --title $title `
              --notes-file "release-assets/RELEASE_NOTES.md" `
              --latest
          }
